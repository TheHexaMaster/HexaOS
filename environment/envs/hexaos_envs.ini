[env:hexaos_esp32p4_es]
extends                     = env:hexaos_common
board                       = esp32p4_es
board_build.variant         = esp32p4_es_msbmaster
build_unflags               = ${env:hexaos_common.build_unflags}
                            -Os                  
                            -flto
                            -flto=auto     

build_flags                 = ${env:hexaos_common.build_flags}
                            -O3
                            -fno-lto
                            -D ARDUINO_USB_MODE=1
                            -D ARDUINO_USB_CDC_ON_BOOT=1
                            -D HEXAOS_BUILD_BOARD=\"esp32p4\"

custom_sdkconfig  = CONFIG_COMPILER_OPTIMIZATION_PERF=y
                    CONFIG_SPIRAM_BOOT_HW_INIT=y
                    CONFIG_SPIRAM_PRE_CONFIGURE_MEMORY_PROTECTION=y
                    CONFIG_SPIRAM_XIP_FROM_PSRAM=y
                    CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=y
                    CONFIG_SPIRAM_ALLOW_NOINIT_SEG_EXTERNAL_MEMORY=y
                    CONFIG_ESP_TIMER_SUPPORTS_ISR_DISPATCH_METHOD=y
                    '# CONFIG_SPIRAM_MEMTEST is not set'
                    CONFIG_LCD_DSI_ISR_CACHE_SAFE=y
                    CONFIG_BT_CONTROLLER_DISABLED=y
                    CONFIG_I2S_ISR_IRAM_SAFE=y
                    CONFIG_I2C_ISR_IRAM_SAFE=y
                    CONFIG_ADC_ONESHOT_CTRL_FUNC_IN_IRAM=y
                    CONFIG_ADC_CONTINUOUS_ISR_IRAM_SAFE=y
                    CONFIG_MCPWM_ISR_CACHE_SAFE=y
                    CONFIG_ANA_CMPR_CTRL_FUNC_IN_IRAM=y
                    CONFIG_ANA_CMPR_ISR_CACHE_SAFE=y
                    CONFIG_RMT_RECV_FUNC_IN_IRAM=y
                    CONFIG_BITSCRAMBLER_CTRL_FUNC_IN_IRAM=y
                    CONFIG_GPIO_CTRL_FUNC_IN_IRAM=y
                    CONFIG_GPTIMER_ISR_CACHE_SAFE=y
                    CONFIG_GPTIMER_CTRL_FUNC_IN_IRAM=y
                    CONFIG_PARLIO_TX_ISR_CACHE_SAFE=y
                    CONFIG_PARLIO_RX_ISR_CACHE_SAFE=y
                    CONFIG_PARLIO_ISR_IRAM_SAFE=y
                    CONFIG_RMT_TX_ISR_CACHE_SAFE=y
                    CONFIG_RMT_RX_ISR_CACHE_SAFE=y
                    CONFIG_RMT_ISR_IRAM_SAFE=y
                    CONFIG_TWAI_ISR_CACHE_SAFE=y
                    CONFIG_TWAI_IO_FUNC_IN_IRAM=y
                    CONFIG_TWAI_ISR_IN_IRAM=y
                    CONFIG_UHCI_ISR_HANDLER_IN_IRAM=y
                    CONFIG_UHCI_ISR_CACHE_SAFE=y
                    CONFIG_TOUCH_CTRL_FUNC_IN_IRAM=y
                    CONFIG_TOUCH_ISR_IRAM_SAFE=y
                    CONFIG_TEMP_SENSOR_ISR_IRAM_SAFE=y
                    CONFIG_ISP_CTRL_FUNC_IN_IRAM=y
                    CONFIG_CAM_CTLR_MIPI_CSI_ISR_CACHE_SAFE=y
                    CONFIG_CAM_CTLR_ISP_DVP_ISR_CACHE_SAFE=y
                    CONFIG_CAM_CTLR_DVP_CAM_ISR_CACHE_SAFE=y
                    CONFIG_LEDC_CTRL_FUNC_IN_IRAM=y
                    CONFIG_DMA2D_OPERATION_FUNC_IN_IRAM=y
                    CONFIG_GDMA_ISR_IRAM_SAFE=y
                    CONFIG_ESP_NETIF_SET_DNS_PER_DEFAULT_NETIF=y
                    CONFIG_CACHE_L2_CACHE_128KB=y
                    CONFIG_CACHE_L2_CACHE_SIZE=0x20000
                    '# CONFIG_LWIP_PPP_SUPPORT is not set'
                    CONFIG_LWIP_IRAM_OPTIMIZATION=y
                    CONFIG_LWIP_EXTRA_IRAM_OPTIMIZATION=y
                    CONFIG_LWIP_LOCAL_HOSTNAME="HexaOS"
                    CONFIG_LWIP_SO_LINGER=y
                    CONFIG_LWIP_TCP_MSS=1360
                    CONFIG_LWIP_TCPIP_TASK_STACK_SIZE=8192
                    CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=64
                    CONFIG_LWIP_TCP_RECVMBOX_SIZE=32
                    CONFIG_LWIP_UDP_RECVMBOX_SIZE=16
                    CONFIG_LWIP_TCP_SND_BUF_DEFAULT=65534
                    CONFIG_LWIP_TCP_WND_DEFAULT=32767
                    CONFIG_LWIP_MAX_SOCKETS=32
                    CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768
                    CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
                    CONFIG_ESP_INT_WDT_TIMEOUT_MS=500
                    CONFIG_ESP_TASK_WDT_TIMEOUT_S=10
                    '# CONFIG_ESP_ENABLE_BT_NIMBLE is not set'
                    '# CONFIG_CACHE_L2_CACHE_256KB is not set'
                    '# CONFIG_COMPILER_OPTIMIZATION_SIZE is not set'
                    '# CONFIG_BT_ENABLED is not set'
                    '# CONFIG_LCD_RGB_ISR_IRAM_SAFE is not set'
                    CONFIG_ESP_HOSTED_ENABLED=y
                    CONFIG_ESP_HOSTED_CP_TARGET_ESP32C6=y
                    CONFIG_ESP_HOSTED_SDIO_HOST_INTERFACE=y